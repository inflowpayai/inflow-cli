packages:
  - 'packages/*'

engineStrict: true

publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '*types*'

allowBuilds:
  esbuild: true
  msw: true

minimumReleaseAgeExclude:
  - '@inflowpayai/mpp'
  - '@inflowpayai/mpp-buyer'
  - '@inflowpayai/x402'
  - '@inflowpayai/x402-buyer'

auto-install-peers: true

strict-peer-dependencies: false
